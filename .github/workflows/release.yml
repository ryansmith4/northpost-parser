name: Release to Maven Central

on:
  release:
    types: [ published ]

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Publish to Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

  update-readme:
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update version in README
        run: sed -i 's/northpost-parser:[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*/northpost-parser:${{ steps.version.outputs.version }}/g' README.md

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update README version to ${{ steps.version.outputs.version }}"
          title: "Update README version to ${{ steps.version.outputs.version }}"
          body: |
            Automated version update from release `${{ github.ref_name }}`.

            Updates dependency snippets in README.md to version `${{ steps.version.outputs.version }}`.
          branch: readme-version-update
          delete-branch: true
